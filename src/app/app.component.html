<!-- ========================================================
     app.component.html — Componente raíz + Navbar
     ======================================================== -->

<!-- Navbar (solo visible en rutas autenticadas) -->
<nav class="app-navbar" *ngIf="showNavbar">

  <!-- Brand -->
  <a routerLink="/dashboard" class="navbar-brand">
    <i class="bi bi-bar-chart-fill"></i>
    DevInsights
  </a>

  <!-- Acciones de la derecha -->
  <div class="navbar-actions">

    <!-- Notificaciones -->
    <button class="navbar-icon-btn" title="Notificaciones" aria-label="Notificaciones">
      <i class="bi bi-bell"></i>
    </button>

    <!-- Dropdown de usuario -->
    <div class="navbar-dropdown" [class.open]="dropdownOpen">
      <button
        class="navbar-avatar"
        (click)="toggleDropdown()"
        aria-label="Menú de usuario"
        title="{{ userName }}"
      >
        {{ userInitials }}
      </button>

      <div class="navbar-dropdown-menu">
        <!-- Info usuario -->
        <div style="padding: 10px 16px 8px; border-bottom: 1px solid var(--color-border);">
          <div style="font-size: 13px; font-weight: 500; color: var(--color-text);">
            {{ userName }}
          </div>
          <div style="font-size: 12px; color: var(--color-text-muted);">
            {{ userEmail }}
          </div>
        </div>

        <a routerLink="/dashboard" class="navbar-dropdown-item" (click)="dropdownOpen = false">
          <i class="bi bi-grid"></i>
          Dashboard
        </a>
        <a routerLink="/settings" class="navbar-dropdown-item" (click)="dropdownOpen = false">
          <i class="bi bi-gear"></i>
          Configuración
        </a>

        <div class="navbar-dropdown-divider"></div>

        <button class="navbar-dropdown-item danger w-100 text-start" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          Cerrar sesión
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Router outlet -->
<main [class.page-with-nav]="showNavbar">
  <router-outlet></router-outlet>
</main>
